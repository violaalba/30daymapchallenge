<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Мои карты</title>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 1200px;
    margin: auto;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 20px;
}

.card {
    border: 1px solid #ddd;
    border-radius: 10px;
    padding: 10px;
}

.card img {
    width: 100%;
    border-radius: 6px;
}

.button {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 14px;
    background: #444;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>
</head>

<body>

<h1>Мои карты</h1>

<div class="gallery">

<div class="card">
<img src="2025/images/day1.png">
<h3>Points</h3>
<a class="button"
   href="https://x.com/..."
   target="_blank">
   See post on Twitter
</a>
</div>

<div class="card">
<img src="images/map2.jpg">
<h3>Изменение NDVI</h3>
<a class="button"
   href="https://instagram.com/..."
   target="_blank">
   Посмотреть пост
</a>
</div>

</div>

</body>
</html>
