<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Day Map Challenge</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px;
    background: #f7f7f7;
    color: #222;
}

h1 {
    text-align: center;
    margin-bottom: 50px;
}

h2 {
    margin-top: 60px;
    margin-bottom: 20px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
}

.card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s ease;
}

.card:hover {
    transform: translateY(-3px);
}

.image-container {
    height: 350px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f3f3f3;
}

.image-container img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
}

.card-title {
    padding: 12px;
    text-align: center;
}

.day-number {
    font-weight: bold;
    margin-bottom: 4px;
}

.theme-title {
    font-size: 0.95rem;
    color: #555;
}

/* ---------- LIGHTBOX ---------- */

#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: #d1d0d0;
    z-index: 1000;

    justify-content: center;
    align-items: center;
}

#lightbox-content {
    max-width: 95vw;
    max-height: 95vh;
}

#lightbox img,
#lightbox video {
    max-width: 95vw;
    max-height: 95vh;
    display: block;
}

#close-btn {
    position: fixed;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 40px;
    cursor: pointer;
    user-select: none;
}

#prev-btn,
#next-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    font-size: 60px;
    cursor: pointer;
    user-select: none;
    padding: 10px 20px;
    z-index: 1001;
}

#prev-btn {
    left: 20px;
}

#next-btn {
    right: 20px;
}

#prev-btn:hover,
#next-btn:hover {
    opacity: 0.7;
}

#lightbox-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 95vw;
    max-height: 95vh;
}

#lightbox-title {
    color: white;
    font-size: 1.4rem;
    font-weight: bold;
    margin-bottom: 15px;
    text-align: center;
    max-width: 90vw;
}



/* ---------- RESPONSIVE ---------- */

@media (max-width: 1200px) {
    .gallery {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 900px) {
    .gallery {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 600px) {
    .gallery {
        grid-template-columns: repeat(2, 1fr);
    }
}

</style>
</head>
<body>

<h1>30 Day Map Challenge</h1>

<div id="content"></div>

<div id="lightbox">
    <div id="close-btn">&times;</div>
    <div id="prev-btn">&#10094;</div>
    <div id="lightbox-wrapper">
    <div id="lightbox-title"></div>
    <div id="lightbox-content"></div>
    </div>
    <div id="next-btn">&#10095;</div>
</div>

<script>

const projects = {

    2025: [
        { day: 1, title: "Points", type: "image" },
        { day: 2, title: "Lines", type: "image" },
        { day: 3, title: "Polygons", type: "image" },
        { day: 4, title: "Data: My Data", type: "image" },
        { day: 5, title: "Earth", type: "image" },
        { day: 6, title: "Dimensions", type: "image" },
        { day: 7, title: "Accessibility", type: "image" },
        { day: 8, title: "Urban", type: "image" },
        { day: 9, title: "Analog", type: "image" },
        { day: 10, title: "Air", type: "video" },
        { day: 11, title: "Minimal Map", type: "image" },
        { day: 12, title: "Map from 2125", type: "image" },
        { day: 13, title: "10 Minute Map", type: "image" },
        { day: 14, title: "Data: OpenStreetMap", type: "image" },
        { day: 15, title: "Fire", type: "image" },
        { day: 16, title: "Cell", type: "image" },
        { day: 17, title: "A New Tool", type: "video" },
        { day: 18, title: "Out of This World", type: "image" },
        { day: 19, title: "Projections", type: "image" },
        { day: 20, title: "Water", type: "video" },
        { day: 21, title: "Icons", type: "image" },
        { day: 22, title: "Data Challenge: Natural Earth", type: "image" },
        { day: 23, title: "Process", type: "video" },
        { day: 24, title: "Places and Their Names", type: "image" },
        { day: 25, title: "Hexagons", type: "image" },
        { day: 26, title: "Transport", type: "image" },
        { day: 27, title: "Boundaries", type: "image" },
        { day: 28, title: "Black", type: "image" },
        { day: 29, title: "Raster", type: "image" },
        { day: 30, title: "Makeover", type: "image" }
    ],

    2023: [
        { day: 1, title: "Points", type: "image" },
        { day: 2, title: "Lines", type: "image" },
        { day: 3, title: "Polygons", type: "image" },
        { day: 4, title: "A Bad Map", type: "image" },
        { day: 5, title: "Analog Map", type: "image" },
        { day: 6, title: "Asia", type: "image" },
        { day: 7, title: "Navigation", type: "image" },
        { day: 8, title: "Africa", type: "image" },
        { day: 9, title: "Hexagons", type: "image" },
        { day: 10, title: "North America", type: "image" },
        { day: 11, title: "Retro", type: "image" },
        { day: 12, title: "South America", type: "image" },
        { day: 13, title: "Choropleth", type: "image" },
        { day: 14, title: "Europe", type: "image" },
        { day: 15, title: "OpenStreetMap", type: "image" },
        { day: 16, title: "Oceania", type: "image" },
        { day: 17, title: "Flow", type: "image" },
        { day: 18, title: "Atmosphere", type: "image" },
        { day: 19, title: "5 Minute Map", type: "image" },
        { day: 20, title: "Outdoor Activities", type: "image" },
        { day: 21, title: "Raster", type: "image" },
        { day: 22, title: "North Is Not Up", type: "image" },
        { day: 23, title: "Population", type: "image" },
        { day: 24, title: "Black & White", type: "image" },
        { day: 25, title: "Antarctica", type: "image" },
        { day: 26, title: "Minimal", type: "image" },
        { day: 27, title: "Dot", type: "image" },
        { day: 28, title: "Is This A Chart Or A Map?", type: "image" },
        { day: 29, title: "Demographic Data", type: "image" },
        { day: 30, title: "My Favourite", type: "image" }
    ]
};

const content = document.getElementById("content");

let currentYear = null;
let currentIndex = null;

for (const year of Object.keys(projects).sort((a,b) => b-a)) {

    const heading = document.createElement("h2");
    heading.textContent = year;
    content.appendChild(heading);

    const gallery = document.createElement("div");
    gallery.className = "gallery";

    projects[year].forEach(project => {

        const card = document.createElement("div");
        card.className = "card";

        const thumbPath =
            `${year}/thumbnails/day${project.day}_sml.jpeg`;


        card.innerHTML = `
            <div class="image-container">
                <img src="${thumbPath}"
                     alt="${project.title}">
            </div>
        
            <div class="card-title">
                <div class="day-number">
                    Day ${project.day}
                </div>
                <div class="theme-title">
                    ${project.title}
                </div>
            </div>
        `;


        card.addEventListener("click", () => {
            currentYear = year;
            currentIndex = projects[year].indexOf(project);
            openMedia(year, project);
        });

        gallery.appendChild(card);
    });

    content.appendChild(gallery);
}

const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightbox-content");
const lightboxTitle =
    document.getElementById("lightbox-title");
const closeBtn = document.getElementById("close-btn");
const prevBtn = document.getElementById("prev-btn");
const nextBtn = document.getElementById("next-btn");

prevBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    showProject(-1);
});

nextBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    showProject(1);
});


function openMedia(year, project) {

    lightboxTitle.textContent =
        `Day ${project.day} — ${project.title}`;

    let mediaPath;

    if (project.type === "video") {
        mediaPath =
            `${year}/maps/day${project.day}.mp4`;

        lightboxContent.innerHTML = `
            <video controls autoplay>
                <source src="${mediaPath}" type="video/mp4">
            </video>
        `;
    }
    else {

        mediaPath =
            `${year}/maps/day${project.day}.png`;

        lightboxContent.innerHTML = `
            <img src="${mediaPath}"
                 alt="${project.title}">
        `;
    }

    lightbox.style.display = "flex";
}

function showProject(offset) {

    const yearProjects = projects[currentYear];

    currentIndex += offset;

    if (currentIndex < 0) {
        currentIndex = yearProjects.length - 1;
    }

    if (currentIndex >= yearProjects.length) {
        currentIndex = 0;
    }

    openMedia(
        currentYear,
        yearProjects[currentIndex]
    );
}


function closeLightbox() {

    lightbox.style.display = "none";
    lightboxContent.innerHTML = "";
    lightboxTitle.textContent = "";
}

closeBtn.addEventListener("click", closeLightbox);

lightbox.addEventListener("click", (event) => {

    if (event.target === lightbox) {
        closeLightbox();
    }
});

document.addEventListener("keydown", (event) => {

    if (lightbox.style.display !== "flex") {
        return;
    }

    if (event.key === "Escape") {
        closeLightbox();
    }

    if (event.key === "ArrowLeft") {
        showProject(-1);
    }

    if (event.key === "ArrowRight") {
        showProject(1);
    }
});

</script>

</body>
</html>
