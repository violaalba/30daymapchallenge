<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>30 Day Map Challenge</title>

<style>

body {
    font-family: Arial, sans-serif;
    max-width: 1600px;
    margin: 0 auto;
    padding: 20px;
    background: #f7f7f7;
    color: #222;
}

h1 {
    text-align: center;
    margin-bottom: 50px;
}

h2 {
    margin-top: 60px;
    margin-bottom: 20px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 20px;
}

.card {
    background: white;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s ease;
}

.card:hover {
    transform: translateY(-3px);
}

.card img {
    width: 100%;
    display: block;
}

.card-title {
    padding: 12px;
    text-align: center;
}

.day-number {
    font-weight: bold;
    margin-bottom: 4px;
}

.theme-title {
    font-size: 0.95rem;
    color: #555;
}

/* ---------- LIGHTBOX ---------- */

#lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 1000;

    justify-content: center;
    align-items: center;
}

#lightbox-content {
    max-width: 95vw;
    max-height: 95vh;
}

#lightbox img,
#lightbox video {
    max-width: 95vw;
    max-height: 95vh;
    display: block;
}

#close-btn {
    position: fixed;
    top: 20px;
    right: 30px;
    color: white;
    font-size: 40px;
    cursor: pointer;
    user-select: none;
}

/* ---------- RESPONSIVE ---------- */

@media (max-width: 1200px) {
    .gallery {
        grid-template-columns: repeat(4, 1fr);
    }
}

@media (max-width: 900px) {
    .gallery {
        grid-template-columns: repeat(3, 1fr);
    }
}

@media (max-width: 600px) {
    .gallery {
        grid-template-columns: repeat(2, 1fr);
    }
}

</style>
</head>
<body>

<h1>30 Day Map Challenge</h1>

<div id="content"></div>

<div id="lightbox">
    <div id="close-btn">&times;</div>
    <div id="lightbox-content"></div>
</div>

<script>

const projects = {

    2025: [
        {
            day: 1,
            title: "Points",
            type: "image"
        },
        {
            day: 2,
            title: "Lines",
            type: "image"
        },
        {
            day: 3,
            title: "Polygons",
            type: "video"
        }

        // ...
    ],

    2023: [
        {
            day: 1,
            title: "Points",
            type: "image"
        }

        // ...
    ]
};

const content = document.getElementById("content");

for (const year of Object.keys(projects).sort((a,b) => b-a)) {

    const heading = document.createElement("h2");
    heading.textContent = year;
    content.appendChild(heading);

    const gallery = document.createElement("div");
    gallery.className = "gallery";

    projects[year].forEach(project => {

        const card = document.createElement("div");
        card.className = "card";

        const thumbPath =
            `${year}/thumbnails/day${project.day}_sml.jpeg`;

        card.innerHTML = `
            <img src="${thumbPath}"
                 alt="${project.title}">
            <div class="card-title">
                <div class="day-number">
                    Day ${project.day}
                </div>
                <div class="theme-title">
                    ${project.title}
                </div>
            </div>
        `;

        card.addEventListener("click", () => {
            openMedia(year, project);
        });

        gallery.appendChild(card);
    });

    content.appendChild(gallery);
}

const lightbox = document.getElementById("lightbox");
const lightboxContent = document.getElementById("lightbox-content");
const closeBtn = document.getElementById("close-btn");

function openMedia(year, project) {

    let mediaPath;

    if (project.type === "video") {
        mediaPath =
            `${year}/maps/day${project.day}.mp4`;

        lightboxContent.innerHTML = `
            <video controls autoplay>
                <source src="${mediaPath}" type="video/mp4">
            </video>
        `;
    }
    else {

        mediaPath =
            `${year}/maps/day${project.day}.png`;

        lightboxContent.innerHTML = `
            <img src="${mediaPath}"
                 alt="${project.title}">
        `;
    }

    lightbox.style.display = "flex";
}

function closeLightbox() {

    lightbox.style.display = "none";
    lightboxContent.innerHTML = "";
}

closeBtn.addEventListener("click", closeLightbox);

lightbox.addEventListener("click", (event) => {

    if (event.target === lightbox) {
        closeLightbox();
    }
});

document.addEventListener("keydown", (event) => {

    if (event.key === "Escape") {
        closeLightbox();
    }
});

</script>

</body>
</html>
